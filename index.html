<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crocreator — Editor de Vias de Escalada</title>
    <meta name="description" content="Crie, compartilhe e comente croquis de vias de escalada com iconografia padronizada FEMEMG." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">

      <!-- TOOLBAR -->
      <header id="toolbar">
        <div class="toolbar-left">
          <span class="logo">🧗 Crocreator</span>
          <a href="/sobre.html" style="color: var(--text-light); text-decoration: none; font-size: 13px; font-weight: 500; margin-left: 12px; transition: color 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='var(--text-light)'">Sobre</a>
          <div class="divider"></div>
          <button id="btn-select" class="tool-btn active" title="Selecionar (V)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-3 6z"/></svg>
          </button>
          <button id="btn-pen" class="tool-btn" title="Desenho livre (P)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
          </button>
          <button id="btn-text" class="tool-btn" title="Texto (T)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          </button>
          <button id="btn-shortcut-protecao" class="tool-btn" title="Traçados e Proteções">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>
          </button>
        </div>
        <div class="toolbar-center">
          <button id="btn-bg" class="icon-btn" title="Adicionar Foto de Fundo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <input type="file" id="file-bg" accept="image/*" style="display: none;" />
          
          <div id="image-properties" style="display: none; align-items: center; gap: 12px; margin-left: 12px; padding-left: 12px; border-left: 1px solid var(--border);">
            <span style="font-size: 13px; color: var(--text-light);">Imagem:</span>
            <label style="display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer; color: var(--text);">
              <input type="checkbox" id="image-bw-toggle"> P/B
            </label>
            <div style="display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text);">
              Opacidade
              <input type="range" id="image-opacity-slider" min="10" max="100" value="50" style="width: 80px;">
            </div>
          </div>

          <div class="divider" style="height: 24px;"></div>
          <button id="btn-undo" class="icon-btn" title="Desfazer (Ctrl+Z)" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
          </button>
          <button id="btn-redo" class="icon-btn" title="Refazer (Ctrl+Shift+Z)" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
          </button>
          <div class="divider" style="height: 24px;"></div>
          <button id="btn-rotate-left" class="icon-btn" title="Rotacionar Esquerda (-15°)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
          <button id="btn-rotate-right" class="icon-btn" title="Rotacionar Direita (+15°)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
          </button>
          <button id="btn-scale-up" class="icon-btn" title="Aumentar (+)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
          </button>
          <button id="btn-scale-down" class="icon-btn" title="Diminuir (-)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>
          </button>
          <div class="divider" style="height: 24px;"></div>
          <button id="btn-lock" class="icon-btn" title="Travar Seleção / Destravar Tudo (L)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </button>
          <button id="btn-delete" class="icon-btn" title="Deletar Selecionados (Del)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
        </div>
        <div class="toolbar-right">
          <button id="btn-export-svg" class="action-btn">↓ SVG</button>
          <button id="btn-export-pdf" class="action-btn primary">↓ PDF</button>
        </div>
      </header>

      <!-- WORKSPACE -->
      <div id="workspace">

        <!-- PALETTE -->
        <aside id="palette-panel">
          <div class="palette-header">
            <span>Símbolos</span>
            <span class="palette-hint">Clique para inserir</span>
          </div>
          <div id="palette-container"></div>
        </aside>

        <!-- CANVAS -->
        <main id="canvas-wrap">
          <div id="altitude-ruler"></div>
          <canvas id="croqui-canvas" resize></canvas>
        </main>

      </div>

        <!-- STATUS BAR -->
        <footer id="statusbar">
          <div style="display: flex; gap: 16px;">
            <div id="status-tool">Ferramenta: Selecionar</div>
            <div id="status-symbol"></div>
          </div>
          <div class="scale-settings" style="display: flex; gap: 16px; align-items: center;">
            <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
              <input type="checkbox" id="toggle-ruler" checked> Régua / Grade
            </label>
          </div>
        </footer>

      <!-- TEXT MODAL -->
      <div id="text-modal-overlay" class="modal-overlay hidden">
        <div class="modal">
          <h3>Texto do Croqui</h3>
          <input type="text" id="text-modal-input" placeholder="Ex: V Sup, Diedro, etc." autocomplete="off" />
          <div class="modal-actions">
            <button id="text-modal-cancel" class="action-btn">Cancelar</button>
            <button id="text-modal-confirm" class="action-btn primary">Confirmar</button>
          </div>
        </div>
      </div>

      <!-- DELETE MODAL -->
      <div id="delete-modal-overlay" class="modal-overlay hidden">
        <div class="modal">
          <h3>Excluir Itens</h3>
          <p id="delete-modal-text" style="color: var(--text); font-size: 14px; margin: 0;">Tem certeza que deseja excluir os itens selecionados?</p>
          <div class="modal-actions">
            <button id="delete-modal-cancel" class="action-btn">Cancelar</button>
            <button id="delete-modal-confirm" class="action-btn" style="background: #ef4444; color: white; border: none;">Excluir</button>
          </div>
        </div>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
